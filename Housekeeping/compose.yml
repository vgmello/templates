services:
  # Base services - no profile assigned, will be started if a dependent service is run.
  housekeeping-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password@
    ports:
      - "54320:5432"
    volumes:
      - housekeeping_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  housekeeping-db-migrations:
    image: liquibase/liquibase:4.32-alpine
    volumes:
      - ./infra/Housekeeping.Database:/app
    depends_on:
      housekeeping-db:
        condition: service_healthy
    working_dir: /app
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo 'Running database migrations...'
        liquibase update --defaults-file liquibase.setup.properties --url=jdbc:postgresql://housekeeping-db:5432/postgres
        liquibase update --defaults-file liquibase.servicebus.properties --url=jdbc:postgresql://housekeeping-db:5432/service_bus
        liquibase update --url=jdbc:postgresql://housekeeping-db:5432/housekeeping
        echo 'Database migrations completed successfully!'

  # Profiled Services
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.3
    profiles: ["aspire"]
    ports:
      - "18140:18888"
      - "18890:18890"
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
      - ASPNETCORE_ENVIRONMENT=Development
    restart: unless-stopped

  housekeeping-api:
    build:
      context: ../                                               #TODO: Update for the actual template
      dockerfile: ./Housekeeping/src/Housekeeping.Api/Dockerfile #TODO: update for the actual template
    profiles: ["api"]
    ports:
      - "8141:8080"
      - "8142:8102"
    depends_on:
      housekeeping-db:
        condition: service_healthy
      housekeeping-db-migrations:
        condition: service_completed_successfully
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ServiceName=Housekeeping
      - ConnectionStrings__HousekeepingDb=Host=housekeeping-db;Port=5432;Database=housekeeping;Username=postgres;Password=password@
      - ConnectionStrings__ServiceBus=Host=housekeeping-db;Port=5432;Database=service_bus;Username=postgres;Password=password@
      - Kestrel__Endpoints__Http__Protocols=Http1
      - Kestrel__Endpoints__Http__Url=http://+:8080
      - Kestrel__Endpoints__Grpc__Protocols=Http2
      - Kestrel__Endpoints__Grpc__Url=http://+:8102
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18890
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=housekeeping-api
      - OTEL_SERVICE_VERSION=1.0.0
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health/internal || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  housekeeping_postgres_data:
