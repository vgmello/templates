services:
  # PostgreSQL Database
  billing-db:
    image: postgres:16-alpine
    container_name: billing-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - billing_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database setup (creates billing and service_bus databases)
  billing-db-setup:
    image: postgres:16-alpine
    container_name: billing-db-setup
    depends_on:
      billing-db:
        condition: service_healthy
    environment:
      - PGPASSWORD=postgres
    command:
      - sh
      - -c
      - |
        echo 'Creating databases...'
        psql -h billing-db -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'billing'" | grep -q 1 || psql -h billing-db -U postgres -c "CREATE DATABASE billing;"
        psql -h billing-db -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'service_bus'" | grep -q 1 || psql -h billing-db -U postgres -c "CREATE DATABASE service_bus;"
        echo 'Databases created successfully!'

  # Database migrations
  billing-db-migrations:
    build:
      context: ./Billing/infra/Billing.Database
      dockerfile: Dockerfile
    container_name: billing-db-migrations
    depends_on:
      billing-db-setup:
        condition: service_completed_successfully
    environment:
      - LIQUIBASE_COMMAND_USERNAME=postgres
      - LIQUIBASE_COMMAND_PASSWORD=postgres
    command:
      - -c
      - |
        echo 'Running database migrations...'
        
        # Step 1: Setup databases
        liquibase update --defaults-file liquibase.setup.properties --url=jdbc:postgresql://billing-db:5432/postgres
        
        # Step 2: Service bus schema
        liquibase update --defaults-file liquibase.service_bus.properties --url=jdbc:postgresql://billing-db:5432/service_bus
        
        # Step 3: Domain schema
        liquibase update --url=jdbc:postgresql://billing-db:5432/billing
        
        echo 'Database migrations completed successfully!'

  # Billing API
  billing-api:
    build:
      context: .
      dockerfile: ./Billing/src/Billing.Api/Dockerfile
    container_name: billing-api
    ports:
      - "5061:5061"
      - "4061:4061"
    depends_on:
      billing-db:
        condition: service_healthy
      billing-db-migrations:
        condition: service_completed_successfully
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5061;http://+:4061
      - ConnectionStrings__BillingDb=Host=billing-db;Port=5432;Database=billing;Username=postgres;Password=postgres
      - ConnectionStrings__ServiceBus=Host=billing-db;Port=5432;Database=service_bus;Username=postgres;Password=postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5061/health/internal || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  billing_postgres_data: